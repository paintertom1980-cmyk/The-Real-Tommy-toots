<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Real Tommy Toots</title>

<style>
body {
    margin:0;
    font-family:"Comic Sans MS", cursive;
    text-align:center;
    color:white;
    overflow-x:hidden;
    background: linear-gradient(135deg,#1a1a1a,#333);
}

/* HEADER */
header {
    padding:40px 20px;
    background:#000;
    border-bottom:5px solid hotpink;
    animation:headerFlash 2s infinite;
}
@keyframes headerFlash{
    0%,100%{border-color:hotpink;}
    50%{border-color:lime;}
}

h1 {
    font-size:3em;
    color:hotpink;
}

/* BUTTONS */
button {
    padding:10px 20px;
    border:none;
    background:hotpink;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin:10px;
}

/* MOVING BUTTON */
.moving {
    position:relative;
    animation:moveButton 3s infinite alternate;
}
@keyframes moveButton{
    0%{left:0;}
    50%{left:15px;top:5px;}
    100%{left:-15px;top:-5px;}
}

/* FART CLOUD */
.fart-cloud {
    position: fixed;
    left: -300px;
    background: radial-gradient(circle, #b6ffb6, #5cff5c);
    color: black;
    padding: 20px;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 0 25px lime;
    z-index: 999;
    max-width: 260px;
}

.fart-small { transform: scale(0.8); }
.fart-big { transform: scale(1.3); box-shadow:0 0 40px lime; }

/* CHAOS MODE */
.chaos-mode {
    animation: chaosBG 0.3s infinite;
}
@keyframes chaosBG {
    0% { background: red; }
    25% { background: blue; }
    50% { background: lime; }
    75% { background: yellow; }
    100% { background: purple; }
}
</style>
</head>

<body>

<header>
<h1>The Real Tommy Toots</h1>
<div>Professional nonsense distributor. Slightly unhinged.</div>
</header>

<section>
<h2>Chaos Controls</h2>

<button class="moving" onclick="addJoke()">
💨 Add Chaos
</button>

<button onclick="insultMe()">Insult Me 😈</button>
<button onclick="toggleChaosMode()">⚠️ DO NOT CLICK</button>

<p id="insultText"></p>
<p id="visitorCount"></p>
</section>

<section>
<h2>Fuel the Chaos</h2>
<a href="https://www.paypal.com/donate/?business=33RHGTSN9CDHE&currency_code=USD" target="_blank">
<button>Send chaos funds 💸</button>
</a>
</section>

<script>

/* VISITORS */
document.getElementById("visitorCount").textContent =
"Visitors online: " + (Math.floor(Math.random()*1000)+50);

/* JOKES */
function addJoke(){
    const jokes = [
"I tried to follow my dreams… they filed a restraining order.",
"My brain has two modes: genius and raccoon in a trash can.",
"I don’t make bad decisions. I make interesting mistakes.",
"I whisper 'what the hell' at least 14 times a day.",
"If I’m the problem… I’m at least a fun one.",
"I put things off so well I almost never do them.",
"I’m not lazy. I’m on energy-saving mode.",
"My life feels like a deleted scene.",
"I once had a plan… it died immediately.",
"I’m emotionally supported by snacks and poor choices.",
"I don’t rise and shine. I caffeinate and hope.",
"Normal is just a setting on a washing machine.",
"I have confidence. It’s just misplaced most of the time.",
"I laugh at my own jokes because someone has to.",
"I don’t need therapy, I need less reality.",
"My hobbies include overthinking and avoiding things.",
"I’d agree with you, but then we’d both be wrong.",
"I don’t lose my mind… it wanders off without me.",
"Life’s a mess, but at least it’s my mess.",
"I came. I saw. I made it weird."
"Tommy mother F'n Toots!"
    ];

    createCloud(jokes[Math.floor(Math.random()*jokes.length)]);
}

/* CLOUD SYSTEM */
function createCloud(text){
    const cloud = document.createElement("div");

    const isBig = Math.random() > 0.7;
    cloud.className = "fart-cloud " + (isBig ? "fart-big" : "fart-small");

    cloud.style.top = Math.random()*70 + "%";
    cloud.innerHTML = "💨 " + text + " 💨";

    document.body.appendChild(cloud);

    playFart(isBig ? "big" : "small");

    let pos = -300;
    const center = window.innerWidth/2 - 130;
    const end = window.innerWidth + 300;

    let paused = false;

    // MOVE IN FAST
    const moveIn = setInterval(()=>{
        if(paused) return;

        pos += 20;
        cloud.style.left = pos + "px";

        if(pos >= center){
            clearInterval(moveIn);

            // PAUSE 10 SECONDS
            setTimeout(()=>moveOut(), 10000);
        }
    },20);

    // MOVE OUT
    function moveOut(){
        const moveOutInt = setInterval(()=>{
            if(paused) return;

            pos += 6;
            cloud.style.left = pos + "px";

            if(pos >= end){
                clearInterval(moveOutInt);
                cloud.remove();
            }
        },20);
    }

    // HOVER PAUSE
    cloud.addEventListener("mouseenter", ()=> paused=true);
    cloud.addEventListener("mouseleave", ()=> paused=false);
}

/* FART SOUND */
function playFart(size){
    const small=[
        "https://www.myinstants.com/media/sounds/cartoon-fart.mp3",
        "https://www.myinstants.com/media/sounds/fart.mp3"
    ];

    const big=[
        "https://www.myinstants.com/media/sounds/fart-with-reverb.mp3"
    ];

    const sounds = size==="big" ? big : small;

    const audio = new Audio(sounds[Math.floor(Math.random()*sounds.length)]);
    audio.volume = 0.5;
    audio.play().catch(()=>{});
}

/* INSULT */
function insultMe(){
    const insults=[
        "You fight like a dairy farmer!",
        "Your secrets are boring.",
        "You bring joy… when you leave.",
        "That face is a bold choice."
    ];
    document.getElementById("insultText").textContent =
        insults[Math.floor(Math.random()*insults.length)];
}

/* CHAOS MODE */
function toggleChaosMode(){
    document.body.classList.toggle("chaos-mode");
}

</script>

</body>
</html>
