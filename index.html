<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Real Tommy Toots</title>

<style>
body {
    margin:0;
    font-family:"Comic Sans MS", cursive;
    text-align:center;
    color:white;
    overflow-x:hidden;
    background: linear-gradient(135deg,#1a1a1a,#333);
    transition: background 0.5s;
}

/* HEADER */
header {
    padding:40px 20px;
    background:#000;
    border-bottom:5px solid hotpink;
    animation:headerFlash 2s infinite;
}
@keyframes headerFlash{
    0%,100%{border-color:hotpink;}
    50%{border-color:lime;}
}

h1 {
    font-size:3em;
    margin:0;
    color:hotpink;
    text-shadow:2px 2px purple;
}

.tagline {
    font-size:1.2em;
    opacity:0.8;
    font-weight:bold;
}

section { padding:40px 20px; }

button {
    padding:10px 20px;
    border:none;
    background:hotpink;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}
button:hover {
    background:deeppink;
    transform:scale(1.2) rotate(5deg);
}

/* MOVING BUTTON */
.moving {
    position:relative;
    animation:moveButton 3s infinite alternate;
}
@keyframes moveButton{
    0%{left:0;}
    50%{left:15px;top:5px;}
    100%{left:-15px;top:-5px;}
}

/* FART CLOUD */
function createCloud(text){
    const cloud = document.createElement("div");
    const sizeClass = Math.random() > 0.7 ? "fart-big" : "fart-small";
    cloud.className = "fart-cloud " + sizeClass;
    cloud.style.top = Math.random() * 70 + "%";
    cloud.innerHTML = "💨 " + text + " 💨";
    document.body.appendChild(cloud);

    // Play fart sound
    playFart(sizeClass === "big" ? "big" : "small");

    let pos = -300; // start offscreen
    const center = window.innerWidth / 2 - 130; // approx center
    const end = window.innerWidth + 300;

    // SPEEDS
    const speedIn = 15; // px per frame
    const speedOut = 5; // px per frame

    // STEP 1: Move fast to center
    const moveIn = setInterval(()=>{
        pos += speedIn;
        if(pos >= center){
            pos = center;
            cloud.style.left = pos + "px";
            clearInterval(moveIn);

            // STEP 2: Pause 10 seconds
            setTimeout(()=>{
                // STEP 3: Move out slowly
                const moveOut = setInterval(()=>{
                    pos += speedOut;
                    cloud.style.left = pos + "px";
                    if(pos >= end){
                        clearInterval(moveOut);
                        cloud.remove();
                    }
                }, 20);
            }, 10000); // 10 second pause
        }
        cloud.style.left = pos + "px";
    }, 20);

    // Pause on hover
    cloud.addEventListener("mouseenter", ()=>{clearInterval(moveIn);});
}

    .fart-cloud {
    position: fixed;
    left: -300px;
    top: 30%;
    background: radial-gradient(circle, #b6ffb6, #5cff5c);
    color: black;
    padding: 20px;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 0 25px lime;
    z-index: 999;
    max-width: 260px;
    pointer-events: none;
}

/* SCREEN SHAKE */
@keyframes screenShake {
    0% { transform: translate(0,0); }
    25% { transform: translate(-5px,5px); }
    50% { transform: translate(5px,-5px); }
    75% { transform: translate(-5px,-5px); }
    100% { transform: translate(0,0); }
}
.shake { animation: screenShake 0.3s; }

/* CHAOS MODE */
.chaos-mode {
    animation: chaosBG 0.3s infinite;
}
@keyframes chaosBG {
    0% { background: red; }
    25% { background: blue; }
    50% { background: lime; }
    75% { background: yellow; }
    100% { background: purple; }
}

/* POPUP */
#tipPopup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:hotpink;
    padding:30px;
    border-radius:20px;
    z-index:1000;
}
</style>
</head>

<body>

<header>
<h1>The Real Tommy Toots</h1>
<div class="tagline">Professional nonsense distributor. Slightly unhinged.</div>
</header>

<section>
<h2>Chaos Controls</h2>

<button class="moving" onclick="addJoke(); chaosFlash(); playSound();">
💨 Add Chaos
</button>

<button onclick="insultMe()">Insult Me 😈</button>

<button onclick="toggleChaosMode()">⚠️ DO NOT CLICK</button>

<p id="insultText"></p>
<p id="visitorCount"></p>
</section>

<section>
<h2>Fuel the Chaos</h2>
<a href="https://www.paypal.com/donate/?business=33RHGTSN9CDHE&currency_code=USD" target="_blank">
<button>Send chaos funds 💸</button>
</a>
</section>

<div id="tipPopup">
<h2>Did you laugh?</h2>
<button onclick="hideTip()">Close</button>
</div>

<footer>© Tommy Toots — still not banned</footer>

<script>

/* VISITORS */
let visits = Math.floor(Math.random()*1000)+50;
document.getElementById("visitorCount").textContent="Visitors online: "+visits;

/* JOKES */
function addJoke(){

    const jokes=[
        "I tried to be normal once. Worst 6 minutes of my life.",
        "My personality is 60% jokes and 40% confusion.",
        "I’m not chaotic. I’m aggressively creative.",
        "If life gives you lemons… question the lemons.",
        "I have inner raccoons.",
        "Chaos is mandatory.",
        "Nothing is sacred… except naps."
    ];

    const chaos = Math.random();

    createCloud(jokes[Math.floor(Math.random()*jokes.length)]);

    if(chaos > 0.7){
        setTimeout(()=>createCloud(jokes[Math.floor(Math.random()*jokes.length)]),200);
        setTimeout(()=>createCloud(jokes[Math.floor(Math.random()*jokes.length)]),400);
    }

    if(chaos > 0.9){
        for(let i=0;i<5;i++){
            setTimeout(()=>createCloud("💨 CHAOS OVERLOAD 💨"), i*150);
        }
        shakeScreen();
    }
}

/* CLOUD */
function createCloud(text){
    const cloud = document.createElement("div");

    cloud.className = "fart-cloud " + (Math.random()>0.7 ? "fart-big" : "fart-small");
    cloud.style.top = Math.random()*70 + "%";
    cloud.innerHTML = "💨 " + text + " 💨";

    document.body.appendChild(cloud);

    setTimeout(()=>cloud.remove(),2500);
}

/* INSULT */
function insultMe(){
    const insults=[
        "You fight like a dairy farmer!",
        "Your secrets are boring.",
        "That face is a bold choice.",
        "You bring joy… when you leave.",
        "Silence would improve your brand."
    ];

    document.getElementById("insultText").textContent =
        insults[Math.floor(Math.random()*insults.length)];
}

/* CHAOS MODE */
let chaosOn = false;
function toggleChaosMode(){
    chaosOn = !chaosOn;

    document.body.classList.toggle("chaos-mode");

    if(chaosOn){
        alert("You did this. There is no going back.");
    }
}

/* SHAKE */
function shakeScreen(){
    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),300);
}

/* FLASH */
function chaosFlash(){
    const colors=["#ff00ff","#00ffff","#ffff00","#ff6600","#00ff00","#ff0066"];
    document.body.style.background =
        `linear-gradient(135deg, ${colors[Math.floor(Math.random()*colors.length)]}, ${colors[Math.floor(Math.random()*colors.length)]})`;
}

/* SOUND */
function playSound(){
    const sounds = [
        "https://www.myinstants.com/media/sounds/fart-with-reverb.mp3",
        "https://www.myinstants.com/media/sounds/cartoon-fart.mp3",
        "https://www.myinstants.com/media/sounds/fart.mp3"
    ];

    const audio = new Audio(sounds[Math.floor(Math.random()*sounds.length)]);
    audio.volume = 0.4;
    audio.play().catch(()=>{});
}

function hideTip(){
    document.getElementById("tipPopup").style.display="none";
}

</script>

</body>
</html
